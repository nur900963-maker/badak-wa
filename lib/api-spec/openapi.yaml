openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: VINCENT BADAK Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: stats
    description: Dashboard statistics
  - name: wa
    description: WhatsApp request operations
  - name: news
    description: News/announcements

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stats:
    get:
      operationId: getStats
      tags: [stats]
      summary: Get dashboard statistics
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users (admin/reseller only)
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserInput"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithPassword"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete a user (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/{id}/extend:
    patch:
      operationId: extendUser
      tags: [users]
      summary: Extend user expiry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExtendInput"
      responses:
        "200":
          description: Extended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wa/requests:
    get:
      operationId: listWaRequests
      tags: [wa]
      summary: Get my active WA requests
      responses:
        "200":
          description: WA requests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WaRequest"
    post:
      operationId: createWaRequest
      tags: [wa]
      summary: Submit a WhatsApp request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WaRequestInput"
      responses:
        "201":
          description: Request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaRequest"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /wa/requests/{id}:
    get:
      operationId: getWaRequest
      tags: [wa]
      summary: Get WA request status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: WA request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WaRequest"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /news:
    get:
      operationId: listNews
      tags: [news]
      summary: List news/announcements
      responses:
        "200":
          description: News list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsItem"
    post:
      operationId: createNews
      tags: [news]
      summary: Create news item (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NewsInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsItem"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string

    SuccessResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    LoginInput:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 1
        password:
          type: string
          minLength: 1

    AuthResult:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, username, role, createdAt]
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [admin, reseller, member]
        expiredAt:
          type: ["string", "null"]
        createdAt:
          type: string
        telegramId:
          type: ["string", "null"]
        createdBy:
          type: ["integer", "null"]

    UserInput:
      type: object
      required: [username, role, durationDays]
      properties:
        username:
          type: string
          minLength: 3
        role:
          type: string
          enum: [reseller, member]
        durationDays:
          type: ["integer", "null"]
          description: "Duration in days. null = lifetime. Admin: 7,15,30,60,90,null. Reseller: 7-30."

    UserWithPassword:
      type: object
      required: [id, username, role, createdAt, password]
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [admin, reseller, member]
        expiredAt:
          type: ["string", "null"]
        createdAt:
          type: string
        password:
          type: string
          description: Plain text password shown once at creation

    ExtendInput:
      type: object
      required: [durationDays]
      properties:
        durationDays:
          type: integer
          minimum: 1

    DashboardStats:
      type: object
      required: [onlineUsers, totalMembers, totalResellers, activeRequests]
      properties:
        onlineUsers:
          type: integer
        totalMembers:
          type: integer
        totalResellers:
          type: integer
        activeRequests:
          type: integer

    WaRequest:
      type: object
      required: [id, userId, targetNumber, method, status, progressPct, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        targetNumber:
          type: string
        method:
          type: string
        status:
          type: string
          enum: [queued, connecting, sending, processing, done, failed]
        progressPct:
          type: integer
          minimum: 0
          maximum: 100
        currentStep:
          type: ["string", "null"]
        estimatedDoneAt:
          type: ["string", "null"]
        createdAt:
          type: string
        doneAt:
          type: ["string", "null"]

    WaRequestInput:
      type: object
      required: [targetNumber, method]
      properties:
        targetNumber:
          type: string
          pattern: "^628[0-9]{8,12}$"
        method:
          type: string
          enum: [aroxen, travaz, lochturn, overhold]

    NewsItem:
      type: object
      required: [id, title, content, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        content:
          type: string
        createdAt:
          type: string

    NewsInput:
      type: object
      required: [title, content]
      properties:
        title:
          type: string
          minLength: 1
        content:
          type: string
          minLength: 1

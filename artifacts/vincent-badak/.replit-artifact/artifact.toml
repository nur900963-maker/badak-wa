kind = "web"
previewPath = "/"
title = "VINCENT BADAK Dashboard"
version = "1.0.0"
id = "artifacts/vincent-badak"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18361

[services.development]
run = "pnpm --filter @workspace/vincent-badak run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/vincent-badak", "run", "build" ]
publicDir = "artifacts/vincent-badak/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18361"
BASE_PATH = "/"
